apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: kv-ai-agent-secrets
  namespace: ai-agent
spec:
  provider: azure
  secretObjects:
    - secretName: app-secrets
      type: Opaque
      data:
        - objectName: sql-connection-string
          key: app-db-connection-string
        - objectName: blob-connection-string
          key: azure-blob-storage
        - objectName: jwt-secret
          key: jwt-secret
        - objectName: application-insights-connection-string
          key: application-insights-connection-string
        - objectName: azure-openai-api-key
          key: azure-openai-api-key
        - objectName: google-search-api-key
          key: google-search-api-key
        - objectName: weather-api-key
          key: weather-api-key
        - objectName: speech-to-text-subscription-key
          key: speech-to-text-subscription-key
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "__WORKLOAD_IDENTITY_CLIENT_ID__"
    keyvaultName: "__KEYVAULT_NAME__"
    tenantId: "__TENANT_ID__"
    objects: |
      array:
        - |
          objectName: sql-connection-string
          objectType: secret
        - |
          objectName: blob-connection-string
          objectType: secret
        - |
          objectName: jwt-secret
          objectType: secret
        - |
          objectName: application-insights-connection-string
          objectType: secret
        - |
          objectName: azure-openai-api-key
          objectType: secret
        - |
          objectName: google-search-api-key
          objectType: secret
        - |
          objectName: weather-api-key
          objectType: secret
        - |
          objectName: speech-to-text-subscription-key
          objectType: secret
